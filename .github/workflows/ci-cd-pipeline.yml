name: 🚀 Shopee Clone CI/CD Pipeline

env:
  NODE_VERSION: '22'

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== CHANGES DETECTION ====================
  changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Detect Changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.ts'
              - 'tsconfig.json'
            tests:
              - 'test/**'
              - 'vitest.setup.js'
              - 'src/**/*.test.{ts,tsx}'
            docs:
              - 'docs/**'
              - '*.md'

  # ==================== CODE QUALITY ====================
  code-quality:
    name: 🔍 Code Quality & Type Safety
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: changes
    if: needs.changes.outputs.src == 'true'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 TypeScript Type Check (noEmit)
        run: pnpm tsc --noEmit

      - name: 🧹 ESLint Check
        run: pnpm run lint

      - name: 💅 Prettier Check
        run: pnpm run prettier

      - name: 📊 Upload Lint Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: |
            eslint-report.json
          retention-days: 3
          if-no-files-found: ignore

  # ==================== SECURITY SCANNING ====================
  security:
    name: 🛡️ Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, code-quality]
    if: needs.changes.outputs.src == 'true' && github.event_name != 'pull_request'

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4

      - name: 🔍 Dependency Audit
        run: pnpm audit --audit-level high
        continue-on-error: true

      - name: 🔐 Secret Detection
        uses: trufflesecurity/trufflehog@v3.82.13
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: 🛡️ SAST Scan with CodeQL
        uses: github/codeql-action/init@v3
        continue-on-error: true
        with:
          languages: typescript, javascript

      - name: 🔍 CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true

  # ==================== TESTING ====================
  test:
    name: 🧪 Testing Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [changes, code-quality]
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.tests == 'true'

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧪 Run All Tests with Coverage
        run: pnpm run test:coverage
        env:
          CI: 'true'
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: 📈 Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: shopee-clone-coverage
          fail_ci_if_error: false

      - name: 📝 Comment Test Results on PR
        if: always() && github.event_name == 'pull_request'
        uses: dorny/test-reporter@v1
        with:
          name: Vitest Results (Node ${{ matrix.node-version }})
          path: ./test-results/*.xml
          reporter: java-junit
          fail-on-error: false

  # ==================== BUILD ====================
  build:
    name: 🏗️ Build Application
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [changes, code-quality, security, test]
    if: |
      always() &&
      needs.changes.outputs.src == 'true' &&
      needs.code-quality.result == 'success' &&
      (needs.security.result == 'success' || needs.security.result == 'skipped') &&
      (needs.test.result == 'success' || needs.test.result == 'skipped')

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: 🗂️ Cache Vite Build
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.vite
            .vite
          key: vite-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}
          restore-keys: |
            vite-${{ runner.os }}-

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Build Production
        run: pnpm run build:production

      - name: 💾 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-assets
          path: dist/
          retention-days: 3

      - name: 📊 Report Bundle Size
        if: github.event_name == 'pull_request'
        run: |
          echo "📦 Bundle size report:"
          du -sh dist/ || echo "No dist folder found"

  # ==================== DEPLOYMENT PRODUCTION ====================
  deploy-production:
    name: 🚀 Production Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    env:
      SLACK_WEBHOOK_CONFIGURED: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 💾 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-assets

      - name: 🚀 Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./

      - name: 🧪 Smoke Tests
        run: |
          # Critical path testing
          curl -f https://shopee-clone-typescript.vercel.app
          curl -f https://shopee-clone-typescript.vercel.app/login
          curl -f https://shopee-clone-typescript.vercel.app/products

      - name: 💡 Production Performance Audit
        uses: treosh/lighthouse-ci-action@v9
        with:
          urls: |
            https://shopee-clone-typescript.vercel.app
            https://shopee-clone-typescript.vercel.app/login
            https://shopee-clone-typescript.vercel.app/products
          uploadArtifacts: true

      - name: 📢 Notify Success
        if: success() && env.SLACK_WEBHOOK_CONFIGURED != ''
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🎉 Shopee Clone đã deploy thành công lên production!"
            }

      - name: 📢 Notify Failure
        if: failure() && env.SLACK_WEBHOOK_CONFIGURED != ''
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ Deployment thất bại! Cần kiểm tra ngay."
            }
